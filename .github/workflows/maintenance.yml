name: Maintenance reminder

# Members Only 비밀번호는 유출되면 되돌릴 수 없다. 교체 주기를 고정하지 않는 대신,
# 반년마다 눈에 띄는 곳에 알림을 남긴다.

on:
  schedule:
    - cron: '0 0 1 3,9 *' # 3월 1일, 9월 1일
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const title = `Members Only 비밀번호 교체 검토 (${new Date().getFullYear()})`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'maintenance',
            });
            if (existing.data.some(i => i.title === title)) return;

            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title,
              labels: ['maintenance'],
              body: [
                '## 확인할 것',
                '',
                '- [ ] 지난 학기에 졸업하거나 랩을 떠난 사람이 있는가? 있다면 비밀번호를 교체한다.',
                '- [ ] Google Drive 공유 폴더에서 졸업생을 제거했는가?',
                '- [ ] Notion `Members` DB의 Alumni 체크박스를 갱신했는가?',
                '',
                '## 비밀번호 교체 방법',
                '',
                '```bash',
                'shuf -n4 /usr/share/dict/words | tr "\\n" "-" | sed "s/-$//"',
                '```',
                '',
                '1. 위 명령으로 무작위 단어 4개를 생성한다. **연구실명·교수명·학교명을 쓰지 않는다.**',
                '2. Settings → Secrets and variables → Actions → `LAB_PASSWORD` 를 갱신한다.',
                '3. Actions에서 `Notion sync & deploy` 를 수동 실행한다.',
                '4. 새 비밀번호를 구성원에게 공유한다.',
                '',
                '재빌드되면 이전 암호문은 사라진다. 산출물을 커밋하지 않기 때문이다.',
                '다만 **비밀번호를 알던 사람이 이미 내려받은 암호문은 되돌릴 수 없다.**',
                '유출되면 곤란한 자료는 애초에 이 사이트에 올리지 않는다. 파일은 Drive에 둔다.',
              ].join('\n'),
            });
